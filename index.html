<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Yukio Mishima</title>

<style>
body {
  background: #0b0b0b;
  color: #f2f2f2;
  font-family: Georgia, serif;
  margin: 0;
  padding: 30px;
}

.hero {
  text-align: center;
  margin-bottom: 10px;
}

.portrait-frame {
  width: 140px;
  height: 180px;
  margin: 0 auto;
  border: 1px solid #333;
  padding: 6px;
}

.portrait-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(100%);
}

.subtitle {
  text-align: center;
  font-size: 11px;
  letter-spacing: 3px;
  opacity: 0.5;
  margin-top: 10px;
}

h1 {
  text-align: center;
  letter-spacing: 4px;
  margin: 10px 0 20px;
}

.progress, .stats {
  text-align: center;
  opacity: 0.7;
  font-size: 13px;
  margin-bottom: 10px;
}

.section {
  max-width: 850px;
  margin: 0 auto 40px;
}

.section-title {
  font-size: 12px;
  opacity: 0.5;
  border-bottom: 1px solid #222;
  padding-bottom: 5px;
  margin-bottom: 10px;
}

.card {
  padding: 10px 0;
  border-bottom: 1px solid #1f1f1f;
  transition: 0.2s;
}

.card:hover {
  transform: translateX(4px);
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.left {
  display: flex;
  gap: 10px;
  align-items: center;
}

.check {
  cursor: pointer;
  font-size: 18px;
  opacity: 0.5;
}

.card.done .check {
  opacity: 1;
}

.title {
  font-size: 15px;
}

.card.done .title {
  opacity: 0.5;
  text-decoration: line-through;
}

.stars {
  display: flex;
  gap: 3px;
}

.star {
  cursor: pointer;
  opacity: 0.2;
}

.star.active {
  opacity: 1;
}

.love-star {
  margin-top: 5px;
  font-size: 16px;
  opacity: 0.2;
  cursor: pointer;
}

.love-star.active {
  opacity: 1;
  filter: drop-shadow(0 0 4px #ff2b2b);
}

.review-toggle {
  margin-top: 6px;
  font-size: 12px;
  opacity: 0.5;
  cursor: pointer;
}

.review-box {
  max-height: 0;
  overflow: hidden;
  transition: 0.3s;
}

.card.open .review-box {
  max-height: 120px;
}

.review {
  width: 100%;
  margin-top: 6px;
  background: transparent;
  border: 1px solid #222;
  color: #f2f2f2;
  font-family: Georgia;
  font-size: 13px;
  padding: 6px;
}
</style>
</head>

<body>

<div class="hero">
  <div class="portrait-frame">
    <img src="mishima.jpg">
  </div>
  <div class="subtitle">Selected Works</div>
</div>

<h1>Yukio Mishima</h1>

<div class="progress" id="progress"></div>
<div class="stats" id="stats"></div>

<div id="app"></div>

<script>

const data = {
"Novels": [
"Confessions of a Mask",
"The Temple of the Golden Pavilion",
"Thirst for Love",
"The Sailor Who Fell from Grace with the Sea",
"After the Banquet"
],

"The Sea of Fertility": [
"Spring Snow",
"Runaway Horses",
"The Temple of Dawn",
"The Decay of the Angel"
],

"Plays": [
"Madame de Sade",
"The Lady Aoi",
"The Damask Drum"
],

"Essays": [
"Sun and Steel",
"In Defense of Culture"
]
};

function load() {
  return JSON.parse(localStorage.getItem("mishima_final_v2")) || {};
}

function save(state) {
  localStorage.setItem("mishima_final_v2", JSON.stringify(state));
}

function render() {
  const state = load();
  const app = document.getElementById("app");
  app.innerHTML = "";

  let total = 0;
  let done = 0;
  let ratings = [];
  let loveCount = 0;

  Object.keys(data).forEach(section => {

    const sectionEl = document.createElement("div");
    sectionEl.className = "section";
    sectionEl.innerHTML = `<div class="section-title">${section}</div>`;

    data[section].forEach((book, i) => {

      const key = section + "_" + i;

      if (!state[key]) {
        state[key] = { done: false, rating: 0, review: "", love: false };
      }

      total++;
      if (state[key].done) done++;
      if (state[key].rating) ratings.push(state[key].rating);
      if (state[key].love) loveCount++;

      const card = document.createElement("div");
      card.className = "card";
      if (state[key].done) card.classList.add("done");

      const stars = Array.from({length: 5}, (_, j) =>
        `<span class="star ${j < state[key].rating ? "active" : ""}" data-i="${j}">★</span>`
      ).join("");

      card.innerHTML = `
        <div class="top">
          <div class="left">
            <div class="check">${state[key].done ? "✔" : "○"}</div>
            <div class="title">${book}</div>
          </div>
          <div class="stars">${stars}</div>
        </div>

        <div class="love-star ${state[key].love ? "active" : ""}">❤️‍🔥</div>

        <div class="review-toggle">review ▼</div>

        <div class="review-box">
          <textarea class="review">${state[key].review || ""}</textarea>
        </div>
      `;

      card.querySelector(".check").onclick = () => {
        state[key].done = !state[key].done;
        save(state);
        render();
      };

      card.querySelectorAll(".star").forEach(star => {
        star.onclick = e => {
          state[key].rating = Number(e.target.dataset.i) + 1;
          save(state);
          render();
        };
      });

      card.querySelector(".love-star").onclick = () => {
        state[key].love = !state[key].love;
        save(state);
        render();
      };

      card.querySelector(".review-toggle").onclick = () => {
        card.classList.toggle("open");
      };

      card.querySelector(".review").oninput = (e) => {
        state[key].review = e.target.value;
        save(state);
      };

      sectionEl.appendChild(card);
    });

    app.appendChild(sectionEl);
  });

  const avg = ratings.length
    ? (ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(2)
    : 0;

  document.getElementById("progress").innerText =
    `Read: ${done} / ${total}`;

  document.getElementById("stats").innerText =
    `Avg rating: ${avg} ★ | Emotional hits: ${loveCount}`;

  save(state);
}

render();

</script>

</body>
</html>

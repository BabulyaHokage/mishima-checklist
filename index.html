<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Юкио Мисима</title>

<style>
body {
  background: #0b0b0b;
  color: #f2f2f2;
  font-family: Georgia, serif;
  margin: 0;
  padding: 30px;
}

.hero {
  text-align: center;
  margin-bottom: 10px;
}

.portrait-frame {
  width: 140px;
  height: 180px;
  margin: 0 auto;
  border: 1px solid #333;
  padding: 6px;
}

.portrait-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(100%);
}

.subtitle {
  text-align: center;
  font-size: 11px;
  letter-spacing: 2px;
  opacity: 0.5;
  margin-top: 10px;
}

h1 {
  text-align: center;
  letter-spacing: 3px;
  margin: 10px 0 10px;
}

.legend {
  max-width: 700px;
  margin: 0 auto 20px;
  font-size: 12px;
  opacity: 0.6;
  line-height: 1.5;
  border: 1px solid #222;
  padding: 10px;
}

.section {
  max-width: 850px;
  margin: 0 auto 40px;
}

.section-title {
  font-size: 12px;
  opacity: 0.5;
  border-bottom: 1px solid #222;
  padding-bottom: 5px;
  margin-bottom: 10px;
}

.card {
  padding: 10px 0;
  border-bottom: 1px solid #1f1f1f;
  transition: 0.2s;
}

.card:hover {
  transform: translateX(4px);
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.left {
  display: flex;
  gap: 10px;
  align-items: center;
}

.check {
  cursor: pointer;
  font-size: 18px;
  opacity: 0.5;
}

.card.done .check {
  opacity: 1;
}

.title {
  font-size: 15px;
}

.card.done .title {
  opacity: 0.5;
  text-decoration: line-through;
}

.stars {
  display: flex;
  gap: 3px;
}

.star {
  cursor: pointer;
  opacity: 0.2;
}

.star.active {
  opacity: 1;
}

.love-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
}

.love-star {
  font-size: 16px;
  opacity: 0.2;
  cursor: pointer;
  transition: 0.2s;
}

.love-star.active {
  opacity: 1;
  filter: drop-shadow(0 0 6px #ff2b2b);
}

.love-label {
  font-size: 11px;
  opacity: 0.35;
  font-style: italic;
}

.review-toggle {
  margin-top: 6px;
  font-size: 12px;
  opacity: 0.5;
  cursor: pointer;
}

.review-box {
  max-height: 0;
  overflow: hidden;
  transition: 0.3s;
}

.card.open .review-box {
  max-height: 120px;
}

.review {
  width: 100%;
  margin-top: 6px;
  background: transparent;
  border: 1px solid #222;
  color: #f2f2f2;
  font-family: Georgia;
  font-size: 13px;
  padding: 6px;
}
</style>
</head>

<body>

<div class="hero">
  <div class="portrait-frame">
    <img src="mishima.png">
  </div>
  <div class="subtitle">избранные произведения</div>
</div>

<h1>Юкио Мисима</h1>

<div class="legend">
<b>Легенда:</b><br>
⭐ — оценка книги (1–5)<br>
❤️‍🔥 — очень зацепило (сильное эмоциональное впечатление)<br>
✔ — прочитано<br>
</div>

<div id="app"></div>

<script>

const data = {
"Романы": [
"Исповедь маски",
"Золотой храм",
"Жажда любви",
"Моряк, которого разлюбило море",
"После банкета"
],

"Тетралогия «Море изобилия»": [
"Весенний снег",
"Несущие кони",
"Храм на рассвете",
"Падение ангела"
],

"Пьесы": [
"Госпожа де Сад",
"Тётя Аои",
"Дамасский барабан"
],

"Эссе": [
"Солнце и сталь",
"В защиту культуры"
]
};

function load() {
  return JSON.parse(localStorage.getItem("mishima_ru_v1")) || {};
}

function save(state) {
  localStorage.setItem("mishima_ru_v1", JSON.stringify(state));
}

function render() {
  const state = load();
  const app = document.getElementById("app");
  app.innerHTML = "";

  Object.keys(data).forEach(section => {

    const sectionEl = document.createElement("div");
    sectionEl.className = "section";
    sectionEl.innerHTML = `<div class="section-title">${section}</div>`;

    data[section].forEach((book, i) => {

      const key = section + "_" + i;

      if (!state[key]) {
        state[key] = { done: false, rating: 0, review: "", love: false };
      }

      const card = document.createElement("div");
      card.className = "card";
      if (state[key].done) card.classList.add("done");

      const stars = Array.from({length: 5}, (_, j) =>
        `<span class="star ${j < state[key].rating ? "active" : ""}" data-i="${j}">★</span>`
      ).join("");

      card.innerHTML = `
        <div class="top">
          <div class="left">
            <div class="check">${state[key].done ? "✔" : "○"}</div>
            <div class="title">${book}</div>
          </div>
          <div class="stars">${stars}</div>
        </div>

        <div class="love-wrap">
          <div class="love-star ${state[key].love ? "active" : ""}">❤️‍🔥</div>
          <div class="love-label">очень зацепило</div>
        </div>

        <div class="review-toggle">отзыв ▼</div>

        <div class="review-box">
  <textarea class="review">${state[key].review || ""}</textarea>
  <div class="save-hint">сохраняется автоматически</div>
</div>
      `;

      .save-hint {
  font-size: 10px;
  opacity: 0.35;
  margin-top: 4px;
  letter-spacing: 0.5px;
  font-style: italic;
}
      
      card.querySelector(".check").onclick = () => {
        state[key].done = !state[key].done;
        save(state);
        render();
      };

      card.querySelectorAll(".star").forEach(star => {
        star.onclick = e => {
          state[key].rating = Number(e.target.dataset.i) + 1;
          save(state);
          render();
        };
      });

      card.querySelector(".love-star").onclick = () => {
        state[key].love = !state[key].love;
        save(state);
        render();
      };

      card.querySelector(".review-toggle").onclick = () => {
        card.classList.toggle("open");
      };

      card.querySelector(".review").oninput = (e) => {
        state[key].review = e.target.value;
        save(state);
      };

      sectionEl.appendChild(card);
    });

    app.appendChild(sectionEl);
  });

  save(state);
}

render();

</script>

</body>
</html>
